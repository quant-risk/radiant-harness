name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.22", "1.24"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download modules
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Build
        run: make build

      - name: Vet
        run: make lint

      - name: Test
        run: make test

      - name: Smoke (CLI end-to-end)
        run: make smoke

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: radiant-${{ matrix.go-version }}
          path: bin/radiant

  cross:
    name: Cross-platform build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - run: make release
      - uses: actions/upload-artifact@v4
        with:
          name: radiant-release
          path: dist/

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: gofmt
        run: |
          if [ "$(gofmt -l . | wc -l)" -ne 0 ]; then
            echo "Files not gofmt-clean:"
            gofmt -l .
            exit 1
          fi
      - name: go vet
        run: go vet ./...

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - run: go test ./... -coverprofile=coverage.out -covermode=atomic
      - run: go tool cover -func=coverage.out | tail -1
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
