# SDD Pipeline Conformity Gate
# Fails the PR if structure violates the standard (frontmatter, links, specs).
# Complement with test/coverage gates from your pipeline (see /setup-ci and docs/engineering/TESTING.md).
name: harness

on:
  pull_request:
  push:
    branches: [main]

jobs:
  audit:
    name: Pipeline Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - uses: actions/setup-node@499339567f6b1499c7c7cc2b06ba3de7bea3bb78  # v4
        with:
          node-version: 22
      - name: Install
        run: npm ci
      - name: Validate pipeline structure
        run: npx radiant-harness audit .
      - name: Validate Mermaid diagrams
        run: npx radiant-harness mermaid .
      - name: Eval spec→implementation fidelity
        run: npx radiant-harness eval .
