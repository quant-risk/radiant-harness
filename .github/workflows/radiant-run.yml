# Radiant Harness — CI/CD Integration
# Runs the SDD harness on every PR to validate specs and run quality gates.
name: radiant-harness

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    name: Validate SDD Pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Radiant Harness
        run: |
          curl -sSL https://github.com/quant-risk/radiant-harness/releases/latest/download/radiant-linux-amd64 -o radiant
          chmod +x radiant
          sudo mv radiant /usr/local/bin/

      - name: Validate pipeline
        run: radiant validate .

      - name: Check spec fidelity
        run: |
          for spec_dir in specs/*/; do
            if [ -d "$spec_dir" ]; then
              echo "Validating $spec_dir..."
              radiant validate "$spec_dir"
            fi
          done

  harness:
    name: Run Harness
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Install Radiant Harness
        run: |
          curl -sSL https://github.com/quant-risk/radiant-harness/releases/latest/download/radiant-linux-amd64 -o radiant
          chmod +x radiant
          sudo mv radiant /usr/local/bin/

      - name: Install AI Agent
        run: |
          # Install Claude Code or other agent
          npm install -g @anthropic-ai/claude-code || true

      - name: Run harness on changed specs
        run: |
          for spec_dir in specs/*/; do
            if [ -d "$spec_dir" ]; then
              echo "Running harness on $spec_dir..."
              radiant run "$spec_dir" --agent=claude --retries=2 || true
            fi
          done
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
